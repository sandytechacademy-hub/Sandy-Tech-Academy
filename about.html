<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Blog & Info | Sandy Tech Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #050816; --primary-color: #3B82F6; --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF; --text-secondary: #94A3B8; --font-headings: 'Poppins', sans-serif;
            --font-paragraphs: 'Inter', sans-serif; --max-width: 1280px; --transition: all 0.3s ease;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-paragraphs); }
        .container { width: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 2rem; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: rgba(5, 8, 22, 0.7); border-bottom: 1px solid var(--border-color); backdrop-filter: blur(16px); }
        .nav-container { display: flex; align-items: center; justify-content: space-between; height: 4.5rem; }
        .nav-logo img { height: 36px; display: block; }
        .nav-menu { display: flex; align-items: center; gap: 2rem; list-style: none; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 0.925rem; font-weight: 500; }
        .nav-link.active { color: var(--text-main); font-weight: 600; }
        .nav-actions { display: flex; align-items: center; gap: 1.25rem; }
        .hamburger { display: none; flex-direction: column; gap: 6px; background: transparent; border: none; cursor: pointer; }
        .hamburger span { display: block; width: 24px; height: 2px; background-color: var(--text-main); }
        .content { padding-top: 10rem; text-align: center; }
        @media (max-width: 768px) {
            .nav-menu { position: fixed; top: 4.5rem; left: -100%; width: 100%; height: calc(100vh - 4.5rem); background: var(--bg-color); flex-direction: column; padding: 2rem; gap: 1.5rem; transition: var(--transition); }
            .nav-menu.active { left: 0; } .hamburger { display: flex; }
        }
    </style>
</head>
<body>
    <nav class="navbar" aria-label="Main Navigation">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="Sandy Tech Academy Logo" onerror="this.src='images/logo.png'">
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="notes.html" class="nav-link">Diploma Notes</a></li>
                <li><a href="Course.html" class="nav-link">Degree Notes</a></li>
                <li><a href="programming.html" class="nav-link">Programming</a></li>
                <li><a href="gallery.html" class="nav-link">Projects</a></li>
                <li><a href="Course.html" class="nav-link">Downloads</a></li>
                <li><a href="about.html" class="nav-link active">Blog</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button style="background:transparent; border:none; color:var(--text-secondary);"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
                <button class="hamburger" id="menuToggle" aria-label="Open Mobile Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>
    <main class="container content">
        <h2>Sandy Tech Academy Blog</h2>
        <p style="color: var(--text-secondary); margin-top: 1rem;">Engineering insights, updates, and deep dives into curriculum architectures.</p>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.getElementById('menuToggle');
            const navMenu = document.getElementById('navMenu');
            menuToggle.addEventListener('click', () => { navMenu.classList.toggle('active'); });
        });
    </script>
</body>
</html>
