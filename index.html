<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandy Tech Academy | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #050816; --primary-color: #3B82F6; --secondary-color: #2563EB;
            --accent-color: #2DD4BF; --card-bg: #111827; --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF; --text-secondary: #94A3B8; --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08); --font-headings: 'Poppins', sans-serif;
            --font-paragraphs: 'Inter', sans-serif; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --max-width: 1280px;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-paragraphs); line-height: 1.6; overflow-x: hidden; }
        .container { width: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 2rem; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: rgba(5, 8, 22, 0.7); border-bottom: 1px solid var(--border-color); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); transition: var(--transition); }
        .nav-container { display: flex; align-items: center; justify-content: space-between; height: 4.5rem; }
        .nav-logo img { height: 36px; display: block; }
        .nav-menu { display: flex; align-items: center; gap: 2rem; list-style: none; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 0.925rem; font-weight: 500; transition: var(--transition); }
        .nav-link:hover, .nav-link.active { color: var(--text-main); }
        .nav-link.active { color: var(--text-main); font-weight: 600; }
        .nav-actions { display: flex; align-items: center; gap: 1.25rem; }
        .nav-icon-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 0.5rem; border-radius: 6px; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        .nav-icon-btn:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }
        .hamburger { display: none; flex-direction: column; gap: 6px; background: transparent; border: none; cursor: pointer; padding: 0.5rem; }
        .hamburger span { display: block; width: 24px; height: 2px; background-color: var(--text-main); transition: var(--transition); }
        .hero { position: relative; padding-top: 10rem; padding-bottom: 6rem; overflow: hidden; text-align: center; }
        .hero h1 { font-family: var(--font-headings); font-size: 3.5rem; font-weight: 800; margin-bottom: 1rem; background: linear-gradient(180deg, #FFFFFF 0%, #A5B4FC 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @media (max-width: 768px) {
            .nav-menu { position: fixed; top: 4.5rem; left: -100%; width: 100%; height: calc(100vh - 4.5rem); background: var(--bg-color); flex-direction: column; align-items: flex-start; padding: 2rem; gap: 1.5rem; transition: var(--transition); border-top: 1px solid var(--border-color); }
            .nav-menu.active { left: 0; } .hamburger { display: flex; }
        }
    </style>
</head>
<body>
    <nav class="navbar" aria-label="Main Navigation">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="Sandy Tech Academy Logo" onerror="this.src='images/logo.png'">
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link active">Home</a></li>
                <li><a href="notes.html" class="nav-link">Diploma Notes</a></li>
                <li><a href="Course.html" class="nav-link">Degree Notes</a></li>
                <li><a href="programming.html" class="nav-link">Programming</a></li>
                <li><a href="gallery.html" class="nav-link">Projects</a></li>
                <li><a href="Course.html" class="nav-link">Downloads</a></li>
                <li><a href="about.html" class="nav-link">Blog</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button class="nav-icon-btn" aria-label="Toggle Dark Mode">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="hamburger" id="menuToggle" aria-label="Open Mobile Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>
    <header class="hero">
        <div class="container">
            <h1>Sandy Tech Academy</h1>
            <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto;">Welcome to the premier educational repository platform.</p>
        </div>
    </header>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.getElementById('menuToggle');
            const navMenu = document.getElementById('navMenu');
            menuToggle.addEventListener('click', () => { navMenu.classList.toggle('active'); });
        });
    </script>
</body>
</html>
